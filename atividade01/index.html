<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="variaveisOperadores.js"></script>
    <link rel="stylesheet" href="style.css">
    <title>Soma</title>
</head>
<body>
    <div class="tela">
        <form>
        <input type="number" placeholder="Primeiro número" id="n1" oninput="calcular()">
        <input type="number" placeholder="Segundo número" id="n2" oninput="calcular()">
        <select name="operacoes" id="operations" onchange="calcular()">
            <option value="sum">Soma</option>
            <option value="sub">Subtração</option>
            <option value="div">Divisão</option>
            <option value="mult">Multiplicação</option>
        </select>
        <label>Resultado: </label>
        <input type="number" id="resultado" readonly tabindex="-1">
    </div>
</form>
</body>
</html>
